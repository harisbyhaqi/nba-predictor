name: Update Daily Predictions

on:
  schedule:
    # 2:00 PM UTC = 10:00 AM ET — after most lineups are confirmed
    - cron: "0 14 * * *"
  push:
    branches: [main]
    paths:
      - "src/update_daily.py"
      - ".github/workflows/update_predictions.yml"
  workflow_dispatch:   # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily predictor
        run: python src/update_daily.py

      - name: Commit updated predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/predictions.json
          git diff --cached --quiet || git commit -m "chore: update predictions for $(date -u +%Y-%m-%d)"
          git push
