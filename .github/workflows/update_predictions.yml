name: Update Daily Predictions

on:
  schedule:
    # 2:00 PM UTC = 10:00 AM ET — after most lineups are confirmed
    - cron: "0 14 * * *"
  workflow_dispatch:   # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest game data
        run: python src/data_download.py
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}

      - name: Preprocess game data
        run: python src/preprocess.py

      - name: Retrain model on latest data
        run: python src/train.py

      - name: Run daily predictor
        run: python src/update_daily.py

      - name: Commit updated data and predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/predictions.json \
                  data/raw/games_raw.csv \
                  data/processed/games_preprocessed.csv \
                  models/points_rf.joblib
          git diff --cached --quiet || git commit -m "chore: update predictions for $(date -u +%Y-%m-%d)"
          git push
